<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5f7fb">
<title>アクトAI活用ガイド β版｜東京セントラルRAC</title>
<style>
  /* ================= デザイントークン ================= */
  :root {
    --primary: #d41367;
    --primary-dark: #a80e50;
    --primary-light: #fbe9f1;
    --primary-pale: #fdf2f7;
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #1f2733;
    --muted: #6b7684;
    --line: #e4e8ef;
    --green: #22a06b;
    --green-light: #e6f6ef;
    --orange: #e8842c;
    --orange-light: #fdf1e4;
    --red: #e0455a;
    --red-light: #fdecef;
    --gold: #f5b301;
    --gold-dark: #9e7300;
    --gold-light: #fef7e0;
    --radius-card: 20px;
    --radius-btn: 14px;
    --shadow: 0 2px 12px rgba(31,39,51,.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    max-width: 560px; margin: 0 auto;
    padding: 16px 16px 120px;
    min-height: 100vh;
  }
  .screen { animation: screenIn .22s ease both; }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .screen { animation: none; }
    html { scroll-behavior: auto; }
  }

  /* ================= 共通部品 ================= */
  .card {
    background: var(--card); border-radius: var(--radius-card);
    box-shadow: var(--shadow); padding: 24px 20px; margin-bottom: 16px;
  }
  .cta {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; min-height: 52px;
    background: var(--primary); color: #fff;
    border: none; border-radius: var(--radius-btn);
    font-size: 15px; font-weight: bold; font-family: inherit;
    cursor: pointer; transition: background .15s, transform .12s, opacity .15s;
  }
  .cta:active { transform: scale(.98); }
  .cta:hover { background: var(--primary-dark); }
  .cta:disabled { background: #c3cbd8; cursor: not-allowed; transform: none; }
  .cta .arrow { font-size: 13px; }
  .cta-sub {
    display: flex; align-items: center; justify-content: center;
    width: 100%; min-height: 48px;
    background: var(--card); color: var(--primary);
    border: 1.5px solid var(--primary); border-radius: var(--radius-btn);
    font-size: 14px; font-weight: bold; font-family: inherit;
    cursor: pointer; transition: background .15s;
  }
  .cta-sub:hover { background: var(--primary-pale); }
  .link-center {
    display: block; text-align: center; color: var(--primary);
    font-size: 13.5px; font-weight: bold; text-decoration: none;
    margin-top: 16px; background: none; border: none; cursor: pointer;
    font-family: inherit; width: 100%;
  }
  .back-btn {
    background: none; border: none; font-size: 22px; color: var(--text);
    cursor: pointer; padding: 4px 8px; margin: 0 0 4px -8px; line-height: 1;
    font-family: inherit;
  }
  .badge {
    display: inline-block; font-size: 11px; font-weight: bold;
    border-radius: 6px; padding: 2px 8px; vertical-align: middle;
  }
  .badge-case { background: var(--primary-light); color: var(--primary-dark); }
  .badge-knowhow { background: var(--green-light); color: var(--green); }
  .badge-faq { background: var(--orange-light); color: var(--orange); }
  .badge-check { background: #efe9fb; color: #7a4fd0; }
  .badge-req { background: var(--red-light); color: var(--red); }
  .badge-reco { background: var(--gold); color: #fff; }

  /* ================= 診断トップ ================= */
  .hero { text-align: center; padding-top: 32px; }
  .hero .club { font-size: 11.5px; letter-spacing: .14em; color: var(--muted); }
  .hero h1 { font-size: 23px; line-height: 1.5; margin: 12px 0 4px; }
  .hero .beta {
    display: inline-block; font-size: 11px; font-weight: bold; color: var(--primary);
    background: var(--primary-light); border-radius: 99px; padding: 2px 12px; margin-bottom: 12px;
  }
  .hero .lead { font-size: 13.5px; color: var(--muted); margin-bottom: 20px; text-align: left; max-width: 360px; margin-left: auto; margin-right: auto; }
  .hero-illust {
    width: 100%; max-width: 360px; margin: 0 auto 20px;
    border-radius: 16px; overflow: hidden;
  }
  .hero-illust img {
    width: 100%; height: auto; display: block;
  }
  .hero-meta {
    display: flex; justify-content: center; gap: 28px; margin-bottom: 24px;
    font-size: 13px; color: var(--muted);
  }
  .hero-meta b { color: var(--text); font-size: 14px; }
  .hero-meta .ico { color: var(--primary); margin-right: 4px; }

  /* ================= 質問画面 ================= */
  .stepper {
    display: flex; align-items: center; justify-content: center;
    margin: 8px 0 6px;
  }
  .step {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold;
    background: #dfe4ec; color: var(--muted);
    flex: 0 0 auto;
  }
  .step.done { background: var(--primary-light); color: var(--primary); }
  .step.current { background: var(--primary); color: #fff; }
  .step-line { width: 22px; height: 3px; background: #dfe4ec; flex: 0 0 auto; }
  .step-line.done { background: var(--primary-light); }
  .step-count { text-align: center; font-size: 12.5px; color: var(--muted); margin-bottom: 18px; }
  .q-title { font-size: 18px; font-weight: bold; text-align: center; line-height: 1.6; margin-bottom: 4px; }
  .q-note { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 18px; }
  .opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .opt {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1.5px solid var(--line);
    border-radius: var(--radius-btn); padding: 14px;
    font-size: 14px; font-weight: bold; text-align: left; line-height: 1.5;
    cursor: pointer; font-family: inherit; color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .opt:active { transform: scale(.99); }
  .opt .mark {
    flex: 0 0 20px; height: 20px; border-radius: 50%;
    border: 2px solid #c3cbd8; position: relative; transition: all .15s;
  }
  .opt.multi .mark { border-radius: 6px; }
  .opt.selected { border-color: var(--primary); background: var(--primary-pale); }
  .opt.selected .mark { border-color: var(--primary); background: var(--primary); }
  .opt.selected .mark::after {
    content: "✓"; color: #fff; font-size: 12px; font-weight: bold;
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  }
  .stars { display: flex; justify-content: center; gap: 10px; margin: 24px 0 8px; }
  .star {
    background: none; border: none; font-size: 38px; cursor: pointer;
    color: #d5dae2; transition: color .15s, transform .12s; font-family: inherit;
    line-height: 1; padding: 2px;
  }
  .star.on { color: var(--gold); }
  .star:active { transform: scale(1.15); }
  .star-label { text-align: center; font-size: 13px; color: var(--muted); min-height: 20px; margin-bottom: 24px; }

  /* ================= 診断結果 ================= */
  .result-head { text-align: center; padding-top: 8px; }
  .result-head .caption { font-size: 15px; font-weight: bold; margin-bottom: 16px; }
  .result-head .pre { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .result-name {
    font-size: 22px; font-weight: 800; color: var(--primary); line-height: 1.5;
    margin-bottom: 16px;
  }
  .fit-wrap { display: flex; align-items: baseline; justify-content: center; gap: 6px; margin-bottom: 20px; }
  .fit-label { font-size: 14px; font-weight: bold; }
  .fit-num { font-size: 52px; font-weight: 800; color: var(--gold-dark); line-height: 1; }
  .fit-pct { font-size: 20px; font-weight: 800; color: var(--gold-dark); }
  .reasons { text-align: left; margin: 0 auto 24px; max-width: 420px; }
  .reasons .r-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
  .reason {
    display: flex; gap: 8px; font-size: 13.5px; margin-bottom: 6px; line-height: 1.6;
  }
  .reason .chk { color: var(--green); font-weight: bold; flex: 0 0 auto; }

  /* ================= ナレッジ一覧 ================= */
  .page-title { font-size: 19px; font-weight: bold; margin: 8px 0 2px; }
  .page-sub { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
  .chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
  .chip {
    flex: 0 0 auto; font-size: 12.5px; font-weight: bold;
    border-radius: 99px; padding: 6px 14px; cursor: pointer;
    background: var(--card); color: var(--muted); border: 1px solid var(--line);
    font-family: inherit; transition: all .15s;
  }
  .chip.on { background: var(--primary); color: #fff; border-color: var(--primary); }
  .k-card {
    display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;
    background: var(--card); border: none; border-radius: 16px;
    box-shadow: var(--shadow); padding: 14px; margin-bottom: 10px;
    cursor: pointer; font-family: inherit; color: var(--text);
    transition: transform .12s;
  }
  .k-card:active { transform: scale(.99); }
  .k-thumb {
    flex: 0 0 56px; height: 56px; border-radius: 12px;
    background: var(--primary-pale);
    display: flex; align-items: center; justify-content: center; font-size: 26px;
  }
  .k-info { flex: 1; min-width: 0; }
  .k-info .k-title { font-size: 14px; font-weight: bold; line-height: 1.5; display: block; }
  .k-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ================= ナレッジ詳細 ================= */
  .detail-head { margin-bottom: 4px; }
  .detail-title { font-size: 20px; font-weight: bold; line-height: 1.55; margin: 8px 0 6px; }
  .detail-meta { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .detail-hero {
    height: 120px; border-radius: 16px; background: linear-gradient(120deg, var(--primary-light), var(--primary-pale));
    display: flex; align-items: center; justify-content: center; font-size: 52px; margin-bottom: 20px;
  }
  .detail-body h3 {
    font-size: 15px; font-weight: bold; margin: 22px 0 8px;
    padding-left: 10px; border-left: 3px solid var(--primary);
  }
  .detail-body p { font-size: 14px; margin-bottom: 10px; }
  .detail-body ul { padding-left: 20px; font-size: 14px; margin-bottom: 10px; }
  .detail-body li { margin-bottom: 6px; }
  .prompt-box {
    background: #f3f5f9; border: 1px solid var(--line); border-radius: 12px;
    padding: 14px; font-size: 13px; white-space: pre-wrap;
    font-family: inherit; margin-bottom: 10px; line-height: 1.7;
  }
  .copy-btn {
    display: flex; align-items: center; justify-content: center;
    width: 100%; min-height: 48px;
    background: var(--primary); color: #fff; border: none;
    border-radius: var(--radius-btn); font-size: 14px; font-weight: bold;
    cursor: pointer; margin-bottom: 10px; font-family: inherit;
    transition: background .15s, transform .12s;
  }
  .copy-btn:hover { background: var(--primary-dark); }
  .copy-btn:active { transform: scale(.98); }
  .example {
    background: var(--green-light); border: 1px solid #c5e8d8; border-radius: 12px;
    padding: 14px; font-size: 12.5px; white-space: pre-wrap; color: #1d4a37;
    margin-bottom: 10px; line-height: 1.7;
  }
  .example-label { font-size: 11px; font-weight: bold; color: var(--green); margin-bottom: 4px; }
  .note-box {
    background: var(--orange-light); border: 1px solid #f3ddc2; border-radius: 12px;
    padding: 12px 14px; font-size: 12px; color: #8a5518; margin-bottom: 10px;
  }
  .check-item {
    display: flex; gap: 10px; align-items: flex-start;
    background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px; font-size: 13.5px; line-height: 1.6;
    cursor: pointer; transition: border-color .15s, background .15s;
  }
  .check-item .box {
    flex: 0 0 20px; height: 20px; border-radius: 6px; margin-top: 2px;
    border: 2px solid #c3cbd8; position: relative; transition: all .15s;
  }
  .check-item.on { border-color: var(--green); background: var(--green-light); }
  .check-item.on .box { border-color: var(--green); background: var(--green); }
  .check-item.on .box::after {
    content: "✓"; color: #fff; font-size: 12px; font-weight: bold;
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  }
  .detail-ctas { margin-top: 28px; display: flex; flex-direction: column; gap: 10px; }

  /* ================= アンケート ================= */
  .sv-title { font-size: 18px; font-weight: bold; text-align: center; margin: 8px 0 4px; }
  .sv-lead { font-size: 12.5px; color: var(--muted); text-align: center; margin-bottom: 18px; }
  .sv-q { font-size: 14px; font-weight: bold; margin: 20px 0 10px; }
  .sv-q .badge { margin-left: 6px; }
  .sv-free {
    width: 100%; min-height: 88px; border: 1.5px solid var(--line); border-radius: 12px;
    padding: 12px; font-size: 14px; font-family: inherit; resize: vertical;
    background: var(--card); color: var(--text);
  }
  .sv-free:focus { outline: none; border-color: var(--primary); }
  .sv-select {
    width: 100%; min-height: 48px; border: 1.5px solid var(--line); border-radius: 12px;
    padding: 0 12px; font-size: 14px; font-family: inherit;
    background: var(--card); color: var(--text); appearance: none;
  }
  .sv-select:focus { outline: none; border-color: var(--primary); }
  .sv-footer { display: flex; align-items: center; gap: 12px; margin-top: 24px; }
  .sv-page { font-size: 13px; color: var(--muted); flex: 0 0 auto; }
  .sv-err { color: var(--red); font-size: 12.5px; margin-top: 10px; display: none; }
  .sv-err.show { display: block; }

  /* ================= 完了 ================= */
  .done-wrap { text-align: center; padding-top: 48px; }
  .done-illust {
    width: 200px; height: 200px; margin: 0 auto 24px;
    border-radius: 50%; overflow: hidden;
  }
  .done-illust img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .done-title { font-size: 19px; font-weight: bold; margin-bottom: 8px; }
  .done-sub { font-size: 13.5px; color: var(--muted); margin-bottom: 32px; }

  /* ================= 下部ナビ ================= */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: var(--card); border-top: 1px solid var(--line);
    display: none; justify-content: space-around; padding: 8px 0 max(10px, env(safe-area-inset-bottom));
  }
  #bottom-nav.visible { display: flex; }
  .nav-item {
    background: none; border: none; font-family: inherit; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 10.5px; color: var(--muted); min-width: 64px;
  }
  .nav-item .n-ico { font-size: 20px; line-height: 1.2; filter: grayscale(1); opacity: .55; }
  .nav-item.active { color: var(--primary); font-weight: bold; }
  .nav-item.active .n-ico { filter: none; opacity: 1; }

  /* ================= トースト ================= */
  .toast {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    background: #2b3646; color: #fff; font-size: 13px;
    padding: 10px 22px; border-radius: 99px; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 20;
    box-shadow: 0 4px 16px rgba(31,39,51,.25); white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  footer { text-align: left; font-size: 11px; color: var(--muted); padding: 24px 16px 8px; max-width: 480px; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>

<div id="app"></div>

<nav id="bottom-nav">
  <button class="nav-item" data-nav="top"><span class="n-ico">🏠</span>ホーム</button>
  <button class="nav-item" data-nav="result"><span class="n-ico">🎯</span>診断結果</button>
  <button class="nav-item" data-nav="list"><span class="n-ico">📚</span>ナレッジ</button>
  <button class="nav-item" data-nav="survey1"><span class="n-ico">✅</span>アンケート</button>
</nav>

<div class="toast" id="toast">コピーしました</div>

<script>
"use strict";

/* ▼▼ 設定：Googleフォーム作成後、ここを差し替えてください ▼▼
   FORM_CONFIG.baseUrl にフォームの viewform URL、entries に各質問の entry ID を設定すると、
   アプリ内アンケートの回答が転記された状態でフォームが開きます。
   未設定の間は FEEDBACK_FORM_URL をそのまま開きます。 */
var FORM_CONFIG = {
  baseUrl: "https://docs.google.com/forms/d/e/1FAIpQLSeFKfm4A_4Dy1g26nwhAT25UByHM7BmPmfYSkxD-cfQuzpyqg/viewform",
  entries: {
    satisfaction: "entry.1016934255",
    usefulness: "entry.463006909",
    interests: "entry.2114160314",
    freeText: "entry.27017827",
    affiliation: "entry.519982523"
  }
};
var FEEDBACK_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeFKfm4A_4Dy1g26nwhAT25UByHM7BmPmfYSkxD-cfQuzpyqg/viewform";
/* ▲▲ ここまで ▲▲ */

/* ================= ナレッジデータ ================= */
var CATS = {
  "case":    { label: "事例",         badge: "badge-case" },
  "knowhow": { label: "ノウハウ",     badge: "badge-knowhow" },
  "faq":     { label: "FAQ",          badge: "badge-faq" },
  "check":   { label: "チェックリスト", badge: "badge-check" }
};

var KNOWLEDGE = [
  {
    id: "a1", cat: "case", icon: "⚙️", min: 4,
    title: "定型業務の自動化",
    sub: "案内メール処理を無人化した設計の始め方",
    story: "他地区からの行事案内メールの処理を、AIとGoogle Apps Script（GAS）で無人化しました。Gmailを監視→届いたメールの添付ファイルをGoogleドライブに保存→PDF/WordのOCRでテキスト抽出→Gemini APIでテンプレ準拠の案内文を自動生成→Discordに通知、という一連の流れがすべて自動で回ります。処理済みメールにはラベルを付けて二重処理を防止し、動作確認用のテスト関数群や、後任者がそのまま引き継げるREADMEまで整備。",
    promptNote: "※このプロンプトは「自動化の設計を一緒に考えてもらう」ための壁打ち用です。非エンジニアでも使えます。",
    prompt: "あなたはノーコード・ローコード自動化の専門家です。次のような繰り返し業務を自動化する方法を、非エンジニアの私にもわかるように一緒に設計してください。\n\n【自動化したい業務】\n◯◯（例：他クラブからの案内メールが届いたら、内容を確認して返信文を作る）\n\n【現在のやり方・頻度・かかっている手間】\n◯◯（例：週に2〜3件、1件あたり15分程度）\n\n【使える環境】\n◯◯（例：Gmail、Googleドライブ、Discordを使っている）\n\n以下の順で回答してください：\n1. どこまで自動化できそうか（全自動／半自動／不可能）の見立て\n2. 必要な工程をステップに分解した設計案\n3. 非エンジニアが実装するときにつまずきやすいポイントと対策",
    note: "実物（GASコード・READMEなど）は今回のアプリには未掲載です。仕組みの紹介にとどめています。",
    tips: [
      "いきなり全自動を目指さない。まず「AIに文章だけ作ってもらう」半自動から始めて、慣れたら自動化の範囲を広げる。",
      "「テストしてから本番に出す」設計をAIに相談すると、二重送信などの事故を防げる。"
    ],
    reasons: ["手作業の繰り返しを仕組みごと無くせる事例です", "仕組みを真似しやすい構成です"]
  },
  {
    id: "b1", cat: "case", icon: "🗂️", min: 4,
    title: "散らばった情報のナレッジベース化",

function computeResult() {
  var scores = {};
  KNOWLEDGE.forEach(function (k) { if (k.cat === "case") scores[k.id] = 0; });
  function add(w) {
    if (!w) return;
    Object.keys(w).forEach(function (id) {
      if (scores.hasOwnProperty(id)) scores[id] += w[id];
    });
  }
  var a = state.answers;
  if (a.q1 !== null) add(Q1_OPTIONS[a.q1].w);
  if (a.q2 !== null) add(Q2_OPTIONS[a.q2].w);
  a.q3.forEach(function (i) { add(Q3_OPTIONS[i].w); });
  if (a.q4 !== null) add(Q4_OPTIONS[a.q4].w);
  if (a.q5 > 0) add(q5Weights(a.q5));

  var bestId = null, bestScore = -1;
  Object.keys(scores).forEach(function (id) {
    if (scores[id] > bestScore) { bestScore = scores[id]; bestId = id; }
  });
  var fit = 70 + Math.round(28 * Math.min(bestScore, 60) / 60);

  var item = KNOWLEDGE.find(function (k) { return k.id === bestId; });
  var reasons = [];
  if (a.q1 !== null && Q1_OPTIONS[a.q1].w[bestId]) reasons.push(Q1_OPTIONS[a.q1].reason);
  item.reasons.forEach(function (r) { if (reasons.length < 3) reasons.push(r); });

  state.resultId = bestId;
  state.resultFit = fit;
  state.resultReasons = reasons;
}

}
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      function () { showToast("プロンプトをコピーしました"); },
      function () { fallbackCopy(text); }
    );
  } else {
    fallbackCopy(text);
  }
}
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function go(screen) {
  state.screen = screen;
  render();
  window.scrollTo(0, 0);
}

/* ================= 画面描画 ================= */
function render() {
  var html = "";
  switch (state.screen) {
    case "top": html = viewTop(); break;
    case "question": html = viewQuestion(); break;
    case "result": html = viewResult(); break;
    case "list": html = viewList(); break;
    case "detail": html = viewDetail(); break;
    case "survey1": html = viewSurvey1(); break;
    case "survey2": html = viewSurvey2(); break;
    case "done": html = viewDone(); break;
  }
  app.innerHTML = '<div class="screen">' + html + "</div>";
  updateNav();
  bindScreenEvents();
}

function updateNav() {
  var nav = document.getElementById("bottom-nav");
  var show = ["result", "list", "detail", "survey1", "survey2", "done"].indexOf(state.screen) >= 0;
  nav.classList.toggle("visible", show);
  var activeMap = { result: "result", list: "list", detail: "list", survey1: "survey1", survey2: "survey1", done: "survey1", top: "top" };
  nav.querySelectorAll(".nav-item").forEach(function (b) {
    b.classList.toggle("active", b.dataset.nav === (activeMap[state.screen] || ""));
  });
}

/* ---- 01 診断トップ ---- */
function viewTop() {
  return '' +
    '<div class="hero">' +
      '<div class="club">東京セントラルローターアクトクラブ</div>' +
      '<h1>あなたに最適な<br>AI活用事例をご提案します</h1>' +
      '<span class="beta">アクトAI活用ガイド β版</span>' +
      '<p class="lead">5つの質問に答えるだけで、あなたの課題に合った<br>クラブ運営×AIの実例と使えるプロンプトをお届けします。</p>' +
      '<div class="hero-illust"><img src="opening.jpg" alt="東京セントラルRAC集合写真"></div>' +
      '<div class="hero-meta">' +
        '<div><span class="ico">🕐</span>所要時間 <b>約1分</b></div>' +
        '<div><span class="ico">✔️</span>質問数 <b>全5問</b></div>' +
      '</div>' +
      '<button class="cta" id="start-btn">診断を開始する <span class="arrow">▶</span></button>' +
      '<button class="link-center" id="skip-to-list">診断せずにナレッジ一覧を見る →</button>' +
    '</div>' +
    '<footer>アクトAI活用ガイド β版（v4）｜東京セントラルローターアクトクラブ<br>掲載事例はすべて実体験にもとづく内容です</footer>';
}

/* ---- 02-04 質問 ---- */
function viewQuestion() {
  var i = state.qIndex;
  var stepper = '<div class="stepper">';
  for (var s = 0; s < 5; s++) {
    var cls = s < i ? "done" : (s === i ? "current" : "");
    stepper += '<div class="step ' + cls + '">' + (s + 1) + "</div>";
    if (s < 4) stepper += '<div class="step-line ' + (s < i ? "done" : "") + '"></div>';
  }
  stepper += "</div>";

  var head = '<button class="back-btn" id="q-back">←</button>' + stepper +
    '<div class="step-count">質問 ' + (i + 1) + " / 5</div>";

  var body = "";
  var a = state.answers;
  if (i === 0) {
    body = '<div class="q-title">今、一番AIに任せたい<br>クラブ運営の困りごとは？</div><div class="q-note"></div>' +
      optList(Q1_OPTIONS, a.q1, false, "q1");
  } else if (i === 1) {
    body = '<div class="q-title">クラブでのあなたの立場は？</div><div class="q-note"></div>' +
      optList(Q2_OPTIONS, a.q2, false, "q2");
  } else if (i === 2) {
    body = '<div class="q-title">AI活用で重視したい<br>ポイントは？</div><div class="q-note">（複数選択可）</div>' +
      optList(Q3_OPTIONS, a.q3, true, "q3");
  } else if (i === 3) {
    body = '<div class="q-title">AIをどのくらい<br>使っていますか？</div><div class="q-note"></div>' +
      optList(Q4_OPTIONS, a.q4, false, "q4");
  } else {
    var stars = "";
    for (var st = 1; st <= 5; st++) {
      stars += '<button class="star ' + (st <= a.q5 ? "on" : "") + '" data-star="' + st + '">★</button>';
    }
    body = '<div class="q-title">今のクラブ運営業務の効率に<br>満足していますか？</div>' +
      '<div class="stars">' + stars + "</div>" +
      '<div class="star-label">' + (a.q5 > 0 ? esc(Q5_LABELS[a.q5 - 1]) : "タップして評価") + "</div>";
  }

  var answered = isAnswered(i);
  var btnLabel = i === 4 ? "診断する" : "次へ";
  return head + body +
    '<button class="cta" id="q-next" ' + (answered ? "" : "disabled") + ">" + btnLabel + ' <span class="arrow">▶</span></button>';
}

function optList(options, selected, multi, qkey) {
  var html = '<div class="opts">';
  options.forEach(function (o, idx) {
    var sel = multi ? selected.indexOf(idx) >= 0 : selected === idx;
    html += '<button class="opt ' + (multi ? "multi " : "") + (sel ? "selected" : "") + '" data-q="' + qkey + '" data-idx="' + idx + '">' +
      '<span class="mark"></span><span>' + esc(o.t) + "</span></button>";
  });
  return html + "</div>";
}

function isAnswered(i) {
  var a = state.answers;
  if (i === 0) return a.q1 !== null;
  if (i === 1) return a.q2 !== null;
  if (i === 2) return a.q3.length > 0;
  if (i === 3) return a.q4 !== null;
  return a.q5 > 0;
}

/* ---- 05 診断結果 ---- */
function viewResult() {
  if (!state.resultId) {
    return '<div class="card" style="text-align:center;"><p style="font-size:14px;margin-bottom:16px;">まだ診断を行っていません。<br>5つの質問に答えると、あなたに合った事例をご提案します。</p>' +
      '<button class="cta" id="start-btn">診断を開始する <span class="arrow">▶</span></button></div>';
  }
  var item = KNOWLEDGE.find(function (k) { return k.id === state.resultId; });
  var reasons = state.resultReasons.map(function (r) {
    return '<div class="reason"><span class="chk">✓</span><span>' + esc(r) + "</span></div>";
  }).join("");
  return '' +
    '<div class="card result-head">' +
      '<div class="caption">診断結果</div>' +
      '<div class="pre">あなたにおすすめの事例は</div>' +
      '<div class="result-name">' + item.icon + " " + esc(item.title) + "</div>" +
      '<div class="fit-wrap"><span class="fit-label">適合度</span><span class="fit-num">' + state.resultFit + '</span><span class="fit-pct">%</span></div>' +
      '<div class="reasons"><div class="r-title">おすすめの理由</div>' + reasons + "</div>" +
      '<button class="cta" id="result-detail">詳しく見る <span class="arrow">▶</span></button>' +
      '<button class="link-center" id="result-to-list">関連ナレッジ一覧へ →</button>' +
      '<button class="link-center" id="result-retry" style="color:var(--muted);">もう一度診断する</button>' +
    "</div>";
}

/* ---- 06 ナレッジ一覧 ---- */
function viewList() {
  var chips = [["all", "すべて"], ["case", "事例"], ["knowhow", "ノウハウ"], ["faq", "FAQ"], ["check", "チェックリスト"]];
  var chipHtml = chips.map(function (c) {
    return '<button class="chip ' + (state.filter === c[0] ? "on" : "") + '" data-filter="' + c[0] + '">' + c[1] + "</button>";
  }).join("");

  var items = KNOWLEDGE.filter(function (k) { return state.filter === "all" || k.cat === state.filter; });
  var cards = items.map(function (k) {
    var reco = state.resultId === k.id ? ' <span class="badge badge-reco">おすすめ</span>' : "";
    return '<button class="k-card" data-id="' + k.id + '">' +
      '<div class="k-thumb">' + k.icon + "</div>" +
      '<div class="k-info"><span class="k-title">' + esc(k.title) + reco + "</span>" +
      '<span class="k-meta"><span class="badge ' + CATS[k.cat].badge + '">' + CATS[k.cat].label + "</span>🕐 " + k.min + "分で読める</span></div>" +
      "</button>";
  }).join("");

  var sub = state.resultId ? "あなたの診断結果に基づいたおすすめコンテンツ" : "クラブ運営×AIの実例・ノウハウ集";
  return '<div class="page-title">関連ナレッジ</div><div class="page-sub">' + sub + "</div>" +
    '<div class="chips">' + chipHtml + "</div>" + cards +
    '<footer>すべて実体験にもとづく内容です</footer>';
}

/* ---- 07 ナレッジ詳細 ---- */
function viewDetail() {
  var k = KNOWLEDGE.find(function (x) { return x.id === state.detailId; });
  if (!k) return viewList();
  var b = "";
  b += '<button class="back-btn" id="detail-back">←</button>';
  b += '<div class="detail-head"><span class="badge ' + CATS[k.cat].badge + '">' + CATS[k.cat].label + "</span>" +
    '<div class="detail-title">' + esc(k.title) + "</div>" +
    '<div class="detail-meta">🕐 ' + k.min + "分で読める｜" + esc(k.sub) + "</div></div>";
  b += '<div class="detail-hero">' + k.icon + "</div>";
  b += '<div class="detail-body">';
  b += "<h3>実際にやったこと</h3><p>" + esc(k.story) + "</p>";
  if (k.points) {
    b += "<h3>やり方の要点</h3><ul>" + k.points.map(function (p) { return "<li>" + esc(p) + "</li>"; }).join("") + "</ul>";
  }
  if (k.checklist) {
    b += "<h3>チェックリスト（タップで確認）</h3>";
    k.checklist.forEach(function (c, idx) {
      b += '<div class="check-item" data-check="' + idx + '"><span class="box"></span><span>' + esc(c) + "</span></div>";
    });
  }
  if (k.prompt) {
    b += "<h3>プロンプト（コピーして使う）</h3>";
    if (k.promptNote) b += '<p style="font-size:12.5px;color:var(--muted);">' + esc(k.promptNote) + "</p>";
    b += '<div class="prompt-box" id="prompt-text">' + esc(k.prompt) + "</div>" +
      '<button class="copy-btn" id="copy-prompt">プロンプトをコピー</button>';
  }
  if (k.example) {
    b += '<div class="example"><div class="example-label">' + esc(k.example.label) + "</div>" + esc(k.example.text) + "</div>";
  }
  if (k.note) {
    b += '<div class="note-box">' + esc(k.note) + "</div>";
  }
  if (k.tips) {
    b += "<h3>コツ</h3><ul>" + k.tips.map(function (t) { return "<li>" + esc(t) + "</li>"; }).join("") + "</ul>";
  }
  b += "</div>";
  b += '<div class="detail-ctas">' +
    '<button class="cta-sub" id="detail-to-list">一覧に戻る</button>' +
    '<button class="cta" id="detail-to-survey">アンケートへ <span class="arrow">▶</span></button>' +
    (state.resultId ? '<button class="link-center" id="detail-to-result">診断結果へ戻る</button>' : "") +
    "</div>";
  return b;
}

/* ---- 08 アンケート 1/2 ---- */
var SAT_OPTIONS = ["とても良い", "良い", "普通", "悪い", "とても悪い"];
var USEFUL_OPTIONS = ["とても参考になった", "参考になった", "普通", "あまり参考にならなかった"];
function viewSurvey1() {
  var s = state.survey;
  function radios(opts, sel, key) {
    return '<div class="opts">' + opts.map(function (o, idx) {
      return '<button class="opt ' + (sel === idx ? "selected" : "") + '" data-sv="' + key + '" data-idx="' + idx + '">' +
        '<span class="mark"></span><span>' + esc(o) + "</span></button>";
    }).join("") + "</div>";
  }
  var ok = s.sat !== null && s.useful !== null;
  return '<div class="sv-title">アンケートにご協力ください</div>' +
    '<div class="sv-lead">今後のアプリ改善のため、ご意見をお聞かせください。</div>' +
    '<div class="sv-q">このアプリはいかがでしたか？ <span class="badge badge-req">必須</span></div>' +
    radios(SAT_OPTIONS, s.sat, "sat") +
    '<div class="sv-q">診断結果は参考になりましたか？ <span class="badge badge-req">必須</span></div>' +
    radios(USEFUL_OPTIONS, s.useful, "useful") +
    '<div class="sv-err" id="sv-err">必須項目に回答してください</div>' +
    '<div class="sv-footer"><span class="sv-page">1 / 2</span>' +
    '<button class="cta" id="sv1-next" ' + (ok ? "" : "disabled") + '>次へ <span class="arrow">▶</span></button></div>';
}

/* ---- 09 アンケート 2/2 ---- */
var INTEREST_OPTIONS = ["AI活用事例", "ノウハウ・Tips", "他クラブとの事例共有", "セミナー・イベント情報", "その他"];
var AFF_OPTIONS = ["他クラブのローターアクター", "ロータリアン", "ゲスト", "東京セントラルRAC会員", "その他"];
function viewSurvey2() {
  var s = state.survey;
  var checks = '<div class="opts">' + INTEREST_OPTIONS.map(function (o, idx) {
    var sel = s.interests.indexOf(idx) >= 0;
    return '<button class="opt multi ' + (sel ? "selected" : "") + '" data-interest="' + idx + '">' +
      '<span class="mark"></span><span>' + esc(o) + "</span></button>";
  }).join("") + "</div>";
  var affOpts = '<option value="">選択してください</option>' + AFF_OPTIONS.map(function (o) {
    return '<option value="' + esc(o) + '" ' + (s.aff === o ? "selected" : "") + ">" + esc(o) + "</option>";
  }).join("");
  return '<button class="back-btn" id="sv2-back">←</button>' +
    '<div class="sv-title">もう少しだけ教えてください</div>' +
    '<div class="sv-lead">残り1画面です。</div>' +
    '<div class="sv-q">今後、どのような情報が欲しいですか？（複数選択可）</div>' + checks +
    '<div class="sv-q">ご意見・ご感想（任意）</div>' +
    '<textarea class="sv-free" id="sv-free" placeholder="「このシーンも欲しい」「ここが分かりにくい」など何でも歓迎です">' + esc(s.free) + "</textarea>" +
    '<div class="sv-q">ご所属を教えてください（任意）</div>' +
    '<select class="sv-select" id="sv-aff">' + affOpts + "</select>" +
    '<div class="sv-footer"><span class="sv-page">2 / 2</span>' +
    '<button class="cta" id="sv-submit">送信する <span class="arrow">▶</span></button></div>' +
    '<p style="font-size:11.5px;color:var(--muted);margin-top:12px;">送信ボタンを押すとGoogleフォームが開きます。内容をご確認のうえ、フォーム側で送信を完了してください。</p>';
}

/* ---- 10 完了 ---- */
function viewDone() {
  return '<div class="done-wrap">' +
    '<div class="done-illust"><img src="ending.jpg" alt="東京セントラルRAC集合写真"></div>' +
    '<div class="done-title">ご回答ありがとうございました！</div>' +
    '<div class="done-sub">いただいたご意見は、今後のアプリ改善に<br>活用させていただきます。</div>' +
    '<button class="cta-sub" id="done-top">トップに戻る</button>' +
    '<button class="link-center" id="done-list">ナレッジ一覧をもう一度見る →</button>' +
    "</div>";
}

/* ================= アンケート送信 ================= */
function buildFormUrl() {
  var s = state.survey;
  if (!FORM_CONFIG.baseUrl) return FEEDBACK_FORM_URL;
  var params = ["usp=pp_url"];
  function addParam(entry, value) {
    if (entry && value) params.push(entry + "=" + encodeURIComponent(value));
  }
  addParam(FORM_CONFIG.entries.satisfaction, s.sat !== null ? SAT_OPTIONS[s.sat] : "");
  addParam(FORM_CONFIG.entries.usefulness, s.useful !== null ? USEFUL_OPTIONS[s.useful] : "");
  s.interests.forEach(function (i) {
    addParam(FORM_CONFIG.entries.interests, INTEREST_OPTIONS[i]);
  });
  addParam(FORM_CONFIG.entries.freeText, s.free);
  addParam(FORM_CONFIG.entries.affiliation, s.aff);
  return FORM_CONFIG.baseUrl + "?" + params.join("&");
}

/* ================= イベント ================= */
function bindScreenEvents() {
  var el;

  // トップ
  el = document.getElementById("start-btn");
  if (el) el.addEventListener("click", function () {
    state.qIndex = 0;
    go("question");
  });
  el = document.getElementById("skip-to-list");
  if (el) el.addEventListener("click", function () { go("list"); });

  // 質問
  el = document.getElementById("q-back");
  if (el) el.addEventListener("click", function () {
    if (state.qIndex === 0) { go("top"); }
    else { state.qIndex--; render(); window.scrollTo(0, 0); }
  });
  el = document.getElementById("q-next");
  if (el) el.addEventListener("click", function () {
    if (!isAnswered(state.qIndex)) return;
    if (state.qIndex === 4) {
      computeResult();
      go("result");
    } else {
      state.qIndex++;
      render(); window.scrollTo(0, 0);
    }
  });
  app.querySelectorAll(".opt[data-q]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var qkey = btn.dataset.q;
      var idx = parseInt(btn.dataset.idx, 10);
      if (qkey === "q3") {
        var pos = state.answers.q3.indexOf(idx);
        if (pos >= 0) state.answers.q3.splice(pos, 1);
        else state.answers.q3.push(idx);
      } else {
        state.answers[qkey] = idx;
      }
      render();
    });
  });
  app.querySelectorAll(".star").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.answers.q5 = parseInt(btn.dataset.star, 10);
      render();
    });
  });

  // 結果
  el = document.getElementById("result-detail");
  if (el) el.addEventListener("click", function () {
    state.detailId = state.resultId;
    state.detailFrom = "result";
    go("detail");
  });
  el = document.getElementById("result-to-list");
  if (el) el.addEventListener("click", function () { go("list"); });
  el = document.getElementById("result-retry");
  if (el) el.addEventListener("click", function () {
    state.answers = { q1: null, q2: null, q3: [], q4: null, q5: 0 };
    state.qIndex = 0;
    go("question");
  });

  // 一覧
  app.querySelectorAll(".chip").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.filter = btn.dataset.filter;
      render();
    });
  });
  app.querySelectorAll(".k-card").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.detailId = btn.dataset.id;
      state.detailFrom = "list";
      go("detail");
    });
  });

  // 詳細
  el = document.getElementById("detail-back");
  if (el) el.addEventListener("click", function () {
    go(state.detailFrom === "result" ? "result" : "list");
  });
  el = document.getElementById("detail-to-list");
  if (el) el.addEventListener("click", function () { go("list"); });
  el = document.getElementById("detail-to-survey");
  if (el) el.addEventListener("click", function () { go("survey1"); });
  el = document.getElementById("detail-to-result");
  if (el) el.addEventListener("click", function () { go("result"); });
  el = document.getElementById("copy-prompt");
  if (el) el.addEventListener("click", function () {
    var k = KNOWLEDGE.find(function (x) { return x.id === state.detailId; });
    if (k && k.prompt) copyText(k.prompt);
  });
  app.querySelectorAll(".check-item").forEach(function (item) {
    item.addEventListener("click", function () {
      item.classList.toggle("on");
    });
  });

  // アンケート1
  app.querySelectorAll(".opt[data-sv]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.survey[btn.dataset.sv] = parseInt(btn.dataset.idx, 10);
      render();
    });
  });
  el = document.getElementById("sv1-next");
  if (el) el.addEventListener("click", function () {
    if (state.survey.sat === null || state.survey.useful === null) {
      var err = document.getElementById("sv-err");
      if (err) err.classList.add("show");
      return;
    }
    go("survey2");
  });

  // アンケート2
  el = document.getElementById("sv2-back");
  if (el) el.addEventListener("click", function () { go("survey1"); });
  app.querySelectorAll(".opt[data-interest]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var idx = parseInt(btn.dataset.interest, 10);
      var pos = state.survey.interests.indexOf(idx);
      if (pos >= 0) state.survey.interests.splice(pos, 1);
      else state.survey.interests.push(idx);
      // テキスト入力を保持してから再描画
      var free = document.getElementById("sv-free");
      if (free) state.survey.free = free.value;
      var aff = document.getElementById("sv-aff");
      if (aff) state.survey.aff = aff.value;
      render();
    });
  });
  el = document.getElementById("sv-submit");
  if (el) el.addEventListener("click", function () {
    var free = document.getElementById("sv-free");
    if (free) state.survey.free = free.value;
    var aff = document.getElementById("sv-aff");
    if (aff) state.survey.aff = aff.value;
    window.open(buildFormUrl(), "_blank", "noopener");
    go("done");
  });

  // 完了
  el = document.getElementById("done-top");
  if (el) el.addEventListener("click", function () { go("top"); });
  el = document.getElementById("done-list");
  if (el) el.addEventListener("click", function () { go("list"); });
}

// 下部ナビ
document.querySelectorAll("#bottom-nav .nav-item").forEach(function (btn) {
  btn.addEventListener("click", function () {
    var dest = btn.dataset.nav;
    if (dest === "result" && !state.resultId) dest = "top";
    go(dest);
  });
});

render();
</script>
</body>
</html>
